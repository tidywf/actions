name: Bump Version

on:
  workflow_call:
    inputs:
      pkg_name:
        required: true
        type: string
      pkg_version:
        required: true
        type: string
      dir_conda_env_yaml:
        required: false
        type: string
        default: deploy/conda/env/yaml
      dir_conda_recipe:
        required: false
        type: string
        default: deploy/conda/recipe
      dvc:
        required: false
        type: boolean
        default: false

jobs:
  bump:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      contents: write
    env:
      APP_ID: ${{ vars.BOT1_APP_ID }}
      INPUTS_PKG_VERSION: ${{ inputs.pkg_version }}
      INPUTS_PKG_NAME: ${{ inputs.pkg_name }}
      INPUTS_DIR_CONDA_ENV_YAML: ${{ inputs.dir_conda_env_yaml }}
      INPUTS_DIR_CONDA_RECIPE: ${{ inputs.dir_conda_recipe }}
    steps:
      - name: 🤖 App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BOT1_APP_ID }}
          private-key: ${{ secrets.BOT1_APP_PRIVATE_KEY }}
      - name: 🚚 Codeout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: 👾 Miniforge setup
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          auto-update-conda: true
          environment-file: ${{ inputs.dir_conda_env_yaml }}/bump.yaml
          activate-environment: bump_env
          miniforge-version: 26.1.0-0 # need to use mamba < 2.6.0 - see conda/conda-lock#906
      - name: 🗄️ DVC pull
        if: inputs.dvc == true
        uses: tidywf/actions/dvc-pull@main
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: 🔖 Bump version
        run: |
          git config --local user.email "${APP_ID}+tidywf-ci-bot[bot]@users.noreply.github.com"
          git config --local user.name "tidywf-ci-bot[bot]"
          OLD_VERSION="$(awk -F': *' '$1=="Version"{print $2; found=1} END{exit !found}' DESCRIPTION)"
          echo "OLD_VERSION=${OLD_VERSION}" >> "$GITHUB_ENV"
          bump-my-version bump --new-version ${INPUTS_PKG_VERSION} --no-commit
      - name: 📦 Install from source
        run: R CMD INSTALL --no-test-load .
      - name: 📖 Render README
        run: quarto render README.qmd
      - name: 💾 Commit and push
        run: |
          git add DESCRIPTION README.md \
            ${INPUTS_DIR_CONDA_ENV_YAML}/${INPUTS_PKG_NAME}.yaml \
            ${INPUTS_DIR_CONDA_ENV_YAML}/pkgdown.yaml \
            ${INPUTS_DIR_CONDA_RECIPE}/recipe.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Bump version: ${OLD_VERSION} => ${INPUTS_PKG_VERSION}"
            git pull --rebase
            git push
          fi

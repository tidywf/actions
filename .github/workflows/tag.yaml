name: Tag Release

on:
  workflow_call:
    inputs:
      pkg_version:
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      contents: write

    steps:
      - name: 🤖 App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BOT1_APP_ID }}
          private-key: ${{ secrets.BOT1_APP_PRIVATE_KEY }}
      - name: 🚚 Codeout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: 📥 Pull latest commits
        id: get_sha
        run: |
          git pull --rebase
          git --no-pager log --decorate=short --pretty=oneline -n3
          LATEST_COMMIT_HASH="$(git --no-pager log -1 --format='%H')"
          echo "latest_commit_hash=${LATEST_COMMIT_HASH}" >> $GITHUB_OUTPUT
      - name: 🔖 Create tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          LATEST_COMMIT_HASH: ${{ steps.get_sha.outputs.latest_commit_hash }}
        with:
          script: |
            const the_tag_name = 'refs/tags/v' + '${{ inputs.pkg_version }}'
            const the_sha = process.env.LATEST_COMMIT_HASH
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: the_tag_name,
                sha: the_sha
              })
            } catch (e) {
              if (e.status !== 422 || !e.message.includes('Reference already exists')) throw e
              core.warning(`Tag ${the_tag_name} already exists — skipping`)
            }

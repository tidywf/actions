name: Docker Deploy

on:
  workflow_call:
    inputs:
      pkg_version:
        required: true
        type: string

jobs:
  docker_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      packages: write

    steps:
      # assumes already tagged version
      - name: 🚚 Codeout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ inputs.pkg_version }}
          persist-credentials: false # safe: no git operations after checkout
      - name: 🏰 QEMU setup
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: 🏯 Buildx setup
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
      - name: 🐙 GitHub CR login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐳 Docker img build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          tags: ghcr.io/${{ github.repository }}:${{ inputs.pkg_version }}
          context: .
          push: true
          platforms: linux/amd64

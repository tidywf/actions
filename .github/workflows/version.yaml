name: Get Version

on:
  workflow_call:
    outputs:
      pkg_version:
        description: 'Package version read from DESCRIPTION'
        value: ${{ jobs.version.outputs.pkg_version }}

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pkg_version: ${{ steps.get.outputs.pkg_version }}
    steps:
      - name: 🚚 Codeout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: get
        run: |
          echo "pkg_version=$(awk -F': *' '$1=="Version"{print $2; found=1} END{exit !found}' DESCRIPTION)" >> $GITHUB_OUTPUT

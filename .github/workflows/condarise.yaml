name: Conda Deploy

on:
  workflow_call:
    inputs:
      pkg_name:
        required: true
        type: string
      pkg_version:
        required: true
        type: string
      conda_org:
        required: false
        type: string
        default: tidywf
      dir_conda_recipe:
        required: false
        type: string
        default: deploy/conda/recipe
      dir_conda_env_yaml:
        required: false
        type: string
        default: deploy/conda/env/yaml
      dir_conda_env_lock:
        required: false
        type: string
        default: deploy/conda/env/lock

jobs:
  conda_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      contents: write
    env:
      INPUTS_CONDA_ORG: ${{ inputs.conda_org }}
      INPUTS_DIR_CONDA_RECIPE: ${{ inputs.dir_conda_recipe }}
      INPUTS_PKG_NAME: ${{ inputs.pkg_name }}
      INPUTS_DIR_CONDA_ENV_YAML: ${{ inputs.dir_conda_env_yaml }}
      INPUTS_DIR_CONDA_ENV_LOCK: ${{ inputs.dir_conda_env_lock }}
      INPUTS_PKG_VERSION: ${{ inputs.pkg_version }}
      APP_ID: ${{ vars.BOT1_APP_ID }}

    steps:
      - name: 🤖 App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BOT1_APP_ID }}
          private-key: ${{ secrets.BOT1_APP_PRIVATE_KEY }}
      - name: 🚚 Codeout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }} # branch write override
      - name: 🏷️ Set dev flags
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "CONDA_DEV_CHANNEL=--channel ${INPUTS_CONDA_ORG}/label/dev" >> $GITHUB_ENV
            echo "ANACONDA_LABEL=--channel dev" >> $GITHUB_ENV
          fi
      - name: 👾 Miniforge setup
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          auto-update-conda: true
          environment-file: ${{ inputs.dir_conda_env_yaml }}/condabuild.yaml
          activate-environment: condabuild_env
          miniforge-version: 26.1.0-0 # need to use mamba < 2.6.0 - see conda/conda-lock#906
      - name: 🐍 Conda pkg build
        run: |
          rattler-build build \
            ${CONDA_DEV_CHANNEL} \
            --channel ${INPUTS_CONDA_ORG} \
            --channel conda-forge \
            --recipe ${INPUTS_DIR_CONDA_RECIPE}/recipe.yaml \
            --output-dir ${RUNNER_TEMP}/out1
      - name: 🐍 Conda pkg upload
        run: |
          pkg_path=$(find ${RUNNER_TEMP}/out1 -type f -name "*.conda")
          rattler-build upload anaconda \
            --owner ${INPUTS_CONDA_ORG} \
            --api-key ${{ secrets.ANACONDA_UPLOAD_TOKEN }} \
            ${ANACONDA_LABEL} \
            ${pkg_path}
      - name: 🔒 Conda lock
        run: |
          conda-lock lock \
            --file ${INPUTS_DIR_CONDA_ENV_YAML}/${INPUTS_PKG_NAME}.yaml \
            ${CONDA_DEV_CHANNEL} \
            --channel ${INPUTS_CONDA_ORG} \
            --channel conda-forge \
            -p linux-64 \
            -p linux-aarch64
          for plat in linux-64 linux-aarch64; do
            conda-lock render -p ${plat} conda-lock.yml \
              && mv conda-${plat}.lock ${INPUTS_DIR_CONDA_ENV_LOCK}/
          done
          rm conda-lock.yml
      - name: 💾 Commit lockfiles
        run: |
          git config --local user.email "${APP_ID}+tidywf-ci-bot[bot]@users.noreply.github.com"
          git config --local user.name "tidywf-ci-bot[bot]"
          git add ${INPUTS_DIR_CONDA_ENV_LOCK}/
          if ! git diff --staged --quiet; then
            git commit -m "[bot] Updating conda-lock files (v${INPUTS_PKG_VERSION})"
            git pull --rebase
            git push
          fi
